<app-navbar />

<!-- Spacer for fixed navbar -->
<div class="h-16"></div>

@for (section of sections; track section.id) {
  <section
    [id]="section.id"
    class="min-h-screen flex items-center justify-center px-4 sm:px-6 lg:px-8"
  >
    <div class="max-w-5xl w-full mx-auto py-20">
      <h2
        class="text-3xl sm:text-4xl font-bold text-center text-[#e0e0e0]"
        style="font-family: 'Montserrat', sans-serif"
      >
        {{ section.label }}
      </h2>
      <p class="text-center text-[#606070] mt-4">Section placeholder</p>
    </div>
  </section>
}

<app-footer />
