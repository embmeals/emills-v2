name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx ng build --base-href /
      - name: Copy CNAME
        run: cp CNAME dist/emills-v2/browser/CNAME 2>/dev/null || true
      - name: Add .nojekyll
        run: touch dist/emills-v2/browser/.nojekyll
      - name: Copy index.html to 404.html for SPA routing
        run: cp dist/emills-v2/browser/index.html dist/emills-v2/browser/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/emills-v2/browser
  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
