# emills.net Portfolio Redesign - Implementation Plan
# For Claude: REQUIRED SUB-SKILL: Use superpowers:executing-plans to implement this plan task-by-task.
#
# Goal: Redesign emills.net as Angular 19+ app with Zard UI, dark neon aesthetic, deployed to GitHub Pages with CodeRabbit reviews.
# Architecture: Angular standalone components + Zard UI + TailwindCSS v4, static build to gh-pages branch via GitHub Actions.
# Tech Stack: Angular 19+, Zard UI (@ngzard/ui), TailwindCSS v4, Lucide Icons, GitHub Pages, CodeRabbit

# =============================================================================
# PHASE 1: Project Scaffold & Tooling
# =============================================================================

phase_1:
  name: Project Scaffold & Tooling

  task_1:
    name: Create Angular project on a feature branch
    files:
      create: [angular project via ng new]
    steps:
      - step: 1
        action: Install Angular CLI globally
        command: npm install -g @angular/cli@latest
        expected: Angular CLI 19.x installed

      - step: 2
        action: Create new branch for redesign (preserve current site on master)
        command: |
          cd C:/Users/Ember/source/repos/embmeals.github.io
          git checkout -b feat/angular-redesign
        expected: On branch feat/angular-redesign

      - step: 3
        action: Scaffold Angular project in a temp directory
        command: |
          cd C:/Users/Ember/source/repos
          ng new emills-angular --style=css --routing=false --ssr=false --skip-git
        expected: Angular 19 project created with standalone components

      - step: 4
        action: Copy Angular project files into repo (keep existing assets)
        notes: |
          Move Angular scaffold files (src/, angular.json, package.json, tsconfig.json, etc.)
          into the repo root. Preserve img/, project-gifs/, CNAME, docs/ folders.
          Remove the temp emills-angular directory after copying.
        expected: Repo has Angular project structure with existing assets preserved

      - step: 5
        action: Verify Angular project builds
        command: |
          cd C:/Users/Ember/source/repos/embmeals.github.io
          npm install && ng build
        expected: Build succeeds, output in dist/

      - step: 6
        action: Commit scaffold
        command: "git add -A && git commit -m 'feat: scaffold Angular 19 project for portfolio redesign'"

  task_2:
    name: Initialize Zard UI and TailwindCSS
    files:
      modify: [angular.json, src/styles.css, src/app/app.config.ts]
    steps:
      - step: 1
        action: Initialize Zard UI
        command: npx @ngzard/ui init
        notes: |
          Interactive prompts - select:
          - app.config.ts location: src/app/app.config.ts
          - index.html location: src/index.html
          - Theme: Neutral (we will customize)
          - Global CSS: src/styles.css
          - Alias: default (@components, @utils)
        expected: Zard UI initialized, tailwind configured, components.json created

      - step: 2
        action: Add core Zard UI components we will need
        command: |
          npx @ngzard/ui add button card badge dialog tabs tooltip avatar icon skeleton
        expected: Components copied into project under components directory

      - step: 3
        action: Install Lucide icons for Angular
        command: npm install lucide-angular
        expected: lucide-angular in package.json

      - step: 4
        action: Verify build still works
        command: ng build
        expected: Clean build

      - step: 5
        action: Commit
        command: "git add -A && git commit -m 'feat: initialize Zard UI with core components and Lucide icons'"

  task_3:
    name: Configure dark neon theme
    files:
      modify: [src/styles.css, tailwind config]
    steps:
      - step: 1
        action: Configure custom color palette in global styles / tailwind config
        colors:
          background: "#0a0a0f"
          surface: "#14141f"
          border: "#1e1e2e"
          primary_cyan: "#00e5ff"
          secondary_magenta: "#ff2d7b"
          tertiary_amber: "#ffb300"
          text_primary: "#e0e0e0"
          text_muted: "#6b7280"
        notes: |
          Extend Tailwind theme with custom colors.
          Set body background to #0a0a0f, default text to #e0e0e0.
          Add neon glow utilities (box-shadow with color spread).
          Import fonts: Mulish and Montserrat (keep from current site).

      - step: 2
        action: Verify dark theme renders correctly
        command: ng serve
        expected: Dark background, light text, no visual issues

      - step: 3
        action: Commit
        command: "git add -A && git commit -m 'feat: configure dark neon color palette and theme'"

  task_4:
    name: Set up GitHub Actions CI/CD and CodeRabbit
    files:
      create:
        - .github/workflows/deploy.yml
        - .coderabbit.yaml
    steps:
      - step: 1
        action: Create GitHub Actions deploy workflow
        code: |
          # .github/workflows/deploy.yml
          name: Deploy to GitHub Pages
          on:
            push:
              branches: [main]
            pull_request:
              branches: [main]
          permissions:
            contents: read
            pages: write
            id-token: write
          concurrency:
            group: "pages"
            cancel-in-progress: false
          jobs:
            build:
              runs-on: ubuntu-latest
              steps:
                - uses: actions/checkout@v4
                - uses: actions/setup-node@v4
                  with:
                    node-version: 20
                    cache: npm
                - run: npm ci
                - run: npx ng build --base-href /
                - name: Copy CNAME
                  run: cp CNAME dist/emills-angular/browser/CNAME 2>/dev/null || true
                - uses: actions/upload-pages-artifact@v3
                  with:
                    path: dist/emills-angular/browser
            deploy:
              if: github.ref == 'refs/heads/main'
              needs: build
              runs-on: ubuntu-latest
              environment:
                name: github-pages
                url: ${{ steps.deployment.outputs.page_url }}
              steps:
                - id: deployment
                  uses: actions/deploy-pages@v4
        notes: |
          The dist path may need adjusting based on angular.json output path.
          CNAME file must be in the deployed directory for custom domain.

      - step: 2
        action: Create CodeRabbit config
        code: |
          # .coderabbit.yaml
          language: en-US
          reviews:
            profile: assertive
            path_instructions:
              - path: "src/app/components/**"
                instructions: |
                  Review Angular components for:
                  - Standalone component pattern (no NgModules)
                  - OnPush change detection
                  - Signal-based inputs/outputs
                  - Accessibility (ARIA labels, keyboard nav)
                  - Responsive design patterns
              - path: "src/app/**/*.spec.ts"
                instructions: |
                  Review tests for:
                  - Meaningful test descriptions
                  - Component testing best practices
                  - Accessibility testing
              - path: "src/styles.css"
                instructions: |
                  Review styles for:
                  - Consistent use of design tokens
                  - No hardcoded colors (use Tailwind classes)
                  - Dark theme contrast ratios (WCAG AA)

      - step: 3
        action: Add .nojekyll file (prevents GitHub Pages from ignoring _files)
        command: touch .nojekyll

      - step: 4
        action: Commit
        command: "git add -A && git commit -m 'ci: add GitHub Actions deploy workflow and CodeRabbit config'"

